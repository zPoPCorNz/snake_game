<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            align-items: center;
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            color: #ecf0f1;
        }

        .main-layout {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }

        .left-side {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .right-side {
            width: 350px;
            min-height: 400px;
        }

        #ui-container {
            text-align: center;
            font-size: 12px;
            line-height: 1.8;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        input {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            padding: 10px;
            margin-bottom: 10px;
            width: 80%;
            border: 2px solid #ecf0f1;
            border-radius: 5px;
            text-align: center;
        }

        #leaderboard {
            margin-top: 15px;
            text-align: left;
            font-size: 10px;
            color: #f1c40f;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 300px;
            margin-bottom: 20px;
            font-size: 10px;
        }

        canvas {
            border: 4px solid #ecf0f1;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            background-color: white; 
        }

        button {
            margin-top: 10px;
            padding: 15px 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #c0392b;
        }
    </style>
</head>

<body>

    <div class="main-layout">
        <div class="left-side">
            <div id="player-info" style="display: none; margin-bottom: 10px;">
                Игрок: <span id="currentPlayer" style="color: #e74c3c;"></span>
            </div>

            <div class="game-container" id="game-wrapper" style="display: none;">
                <div class="score-board">
                    <div id="score">Score: 0</div>
                    <div id="highScore">High: 0</div>
                </div>
                <canvas id="gameCanvas" width="300" height="300"></canvas>
                <button id="restartBtn" onclick="resetGame()" style="display: none;">TRY AGAIN</button>
            </div>
        </div>

        <div class="right-side">
            <div id="ui-container">
                <div id="login-section">
                    <input type="text" id="usernameInput" placeholder="Введите никнейм">
                    <button onclick="loginAndStart()">PLAY</button>
                </div>
                <div id="leaderboard"></div>
            </div>
        </div>
    </div>

    <script>
        let currentUserId = null;

        async function loginAndStart() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert("Введите никнейм!");
                return;
            }

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                
                const userData = await response.json();
                currentUserId = userData.id;

                document.getElementById('login-section').style.display = 'none';
                document.getElementById('player-info').style.display = 'block';
                document.getElementById('currentPlayer').innerText = userData.username;
                document.getElementById('game-wrapper').style.display = 'flex';

                showLeaderboard();
                createFood();
                main(); 
            } catch (error) {
                console.error("Ошибка сети:", error);
                alert("Ошибка подключения к серверу!");
            }
        }

        async function saveScoreToDB(finalScore) {
            if (!currentUserId || finalScore === 0) return;
            try {
                await fetch('/api/scores', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId, score: finalScore })
                });
                showLeaderboard();
            } catch (error) {
                console.error("Ошибка сохранения:", error);
            }
        }

        async function showLeaderboard() {
            try {
                const response = await fetch('/api/scores/top');
                const topScores = await response.json();
                
                const leaderboardDiv = document.getElementById('leaderboard');
                leaderboardDiv.innerHTML = "<div style='text-align: center; margin-bottom: 10px; color: white;'>Топ 10 Игроков:</div>";
                
                topScores.forEach((entry, index) => {
                    leaderboardDiv.innerHTML += `${index + 1}. ${entry.username} — ${entry.score}<br>`;
                });
            } catch (error) {
                console.error("Ошибка загрузки:", error);
            }
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let snake = [{x: 150, y: 150}, {x: 140, y: 150}, {x: 130, y: 150}, {x: 120, y: 150}, {x: 110, y: 150}];
        const INITIAL_SPEED = 100;
        let currentSpeed = INITIAL_SPEED;
        let timeoutId;
        let score = 0;
        let changingDirection = false;
        let foodX, foodY;
        let dx = 10, dy = 0;

        let highScore = localStorage.getItem("snakeHighScore") || 0;
        document.getElementById('highScore').innerHTML = "High Score: " + highScore;

        function drawSnakePart(snakePart) {
            ctx.fillStyle = 'lightgreen';
            ctx.strokeStyle = 'darkgreen';
            ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
            ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
        }

        function drawSnake() { snake.forEach(drawSnakePart); }

        function advanceSnake() { 
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                document.getElementById('score').innerHTML = "Score: " + score;
                if (currentSpeed > 30) currentSpeed -= 2;
                createFood();
            } else { snake.pop(); }
        }

        function clearCanvas() {
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        function randomTen(min, max) { return Math.round((Math.random() * (max - min) + min) / 10) * 10; }

        function createFood() {  
            foodX = randomTen(0, canvas.width - 10);  
            foodY = randomTen(0, canvas.height - 10);
            snake.forEach(part => { if (part.x === foodX && part.y === foodY) createFood(); });
        }

        function drawFood() { 
            ctx.fillStyle = 'red'; 
            ctx.strokeStyle = 'darkred';
            ctx.fillRect(foodX, foodY, 10, 10); 
            ctx.strokeRect(foodX, foodY, 10, 10);
        }

        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;
            const keyPressed = event.keyCode;
            if (keyPressed === 37 && dx !== 10) { dx = -10; dy = 0; }
            if (keyPressed === 38 && dy !== 10) { dx = 0; dy = -10; }
            if (keyPressed === 39 && dx !== -10) { dx = 10; dy = 0; }
            if (keyPressed === 40 && dy !== -10) { dx = 0; dy = 10; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return snake[0].x < 0 || snake[0].x >= canvas.width || snake[0].y < 0 || snake[0].y >= canvas.height;
        }

        function resetGame() {
            document.getElementById("restartBtn").style.display = "none";
            snake = [{x: 150, y: 150}, {x: 140, y: 150}, {x: 130, y: 150}, {x: 120, y: 150}, {x: 110, y: 150}];
            score = 0; dx = 10; dy = 0; currentSpeed = INITIAL_SPEED; changingDirection = false;
            document.getElementById('score').innerHTML = "Score: " + score;
            clearTimeout(timeoutId);
            createFood();
            main();
        }

        function main() {
            if (hasGameEnded()) {
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem("snakeHighScore", highScore);
                    document.getElementById('highScore').innerHTML = "High: " + highScore;
                }
                saveScoreToDB(score);
                ctx.fillStyle = "black";
                ctx.font = "20px 'Press Start 2P'";
                ctx.textAlign = "center";
                ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
                document.getElementById("restartBtn").style.display = "block";
                return; 
            }
            timeoutId = setTimeout(() => {
                changingDirection = false; 
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, currentSpeed);
        }

        document.addEventListener("keydown", changeDirection);

        document.addEventListener("keydown", function(event) {
            if (event.keyCode === 13) {
                const loginSection = document.getElementById("login-section");
                if (loginSection.style.display !== "none") {
                    loginAndStart();
                    return;
                }

                const restartBtn = document.getElementById("restartBtn");
                if (restartBtn.style.display === "block") {
                    resetGame();
                    return;
                }
            }
        });
    </script>
</body>
</html>
